<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archetype Matchup Table</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #222;
            padding: 24px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .title-row {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 20px;
        }

        .home-link {
            font-size: 1.2rem;
            line-height: 1;
            text-decoration: none;
            color: #555;
        }

        .home-link:hover { color: #1a1a2e; }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            white-space: nowrap;
        }

        #page-links {
            line-height: 1;
        }

        #page-links a {
            display: inline-block;
            margin-right: 8px;
            padding: 4px 12px;
            border-radius: 6px;
            background: white;
            border: 1px solid #c8d4e8;
            color: #1e3a5f;
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
        }

        #page-links a:hover {
            background: #e8eef7;
        }

        .controls {
            background: white;
            border-radius: 10px;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .divider { color: #aaa; font-size: 0.85rem; }

        label { font-weight: 600; font-size: 0.85rem; color: #555; }

        input[type="text"] {
            padding: 7px 12px;
            border: 1.5px solid #d0d0d0;
            border-radius: 6px;
            font-size: 0.88rem;
            width: 260px;
        }

        input[type="text"]:focus { outline: none; border-color: #1a73e8; }
        input[type="file"] { font-size: 0.88rem; }

        button {
            padding: 7px 16px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
        }

        button:hover { background: #1557b0; }

        #error-msg {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 16px;
            font-size: 0.88rem;
        }


        #status-msg {
            color: #777;
            font-size: 0.88rem;
            padding: 12px 4px;
        }

        .legend {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 0.78rem;
            color: #666;
            margin-top: 12px;
        }

        .legend-gradient {
            width: 160px;
            height: 14px;
            border-radius: 4px;
            border: 1px solid #555;
            background: linear-gradient(to right, rgb(180,0,0), rgb(15,15,15), rgb(0,120,0));
        }

        .legend-bg-gradient {
            width: 100px;
            height: 14px;
            border-radius: 4px;
            border: 1px solid #ddd;
            background: linear-gradient(to right, #ffffff, #b9b9b9);
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #table-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #table-container {
            overflow: auto;
            flex: 1;
            min-height: 0;
            max-width: calc(100vw - 48px);
            overscroll-behavior-x: contain;
        }

        .matchup-table {
            border-collapse: separate;
            border-spacing: 0;
            white-space: nowrap;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            font-size: 0.76rem;
        }

        .matchup-table th,
        .matchup-table td {
            padding: 6px 10px;
            border-bottom: 1px solid #e8e8e8;
            border-right: 1px solid #e8e8e8;
        }

        /* Sticky top-left corner */
        .matchup-table thead th:first-child {
            position: sticky;
            left: 0;
            z-index: 4;
        }

        /* Sticky header row */
        .matchup-table thead th {
            background: #1e3a5f;
            color: white;
            font-weight: 600;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        /* Rotated archetype column headers */
        .matchup-table thead th.col-arch {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            height: 110px;
            vertical-align: bottom;
            text-align: left;
            font-size: 0.72rem;
            padding: 6px 8px;
        }

        /* Sticky row label column */
        .matchup-table td.row-header {
            position: sticky;
            left: 0;
            background: white;
            z-index: 1;
            font-weight: 600;
            text-align: left;
            min-width: 150px;
            border-right: 2px solid #c8c8c8;
        }

        .matchup-table tbody tr:hover td.row-header { background: #f0f7ff; }

        td.players-cell { text-align: center; font-weight: 600; color: #444; }

        td.total-cell {
            text-align: center;
            font-weight: 600;
            border-right: 2px solid #b0c4f0;
        }

        td.matchup-cell { text-align: center; }

        .win-rate { font-size: 0.80rem; font-weight: 700; display: block; }
        .record { font-size: 0.68rem; color: #555; margin-top: 1px; }

        td.no-data {
            background: #f7f7f7 !important;
            color: #c0c0c0;
            text-align: center;
        }

        #tooltip {
            display: none;
            position: fixed;
            background: #1e3a5f;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.78rem;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }

        #players-tooltip {
            display: none;
            position: fixed;
            z-index: 1000;
            background: white;
            border: 1px solid #d0d0d0;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            padding: 6px 10px;
            font-size: 0.78rem;
            pointer-events: none;
            max-height: 70vh;
            overflow-y: auto;
        }

        .pt-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0 14px;
            padding: 2px 0;
            white-space: nowrap;
            align-items: baseline;
            border-bottom: 1px solid #f0f0f0;
        }

        .pt-row:last-child { border-bottom: none; }
        .pt-name { color: #222; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .pt-rec { color: #555; font-variant-numeric: tabular-nums; font-weight: 600; }

        .matchup-table td.row-header a { color: inherit; text-decoration: none; }
        .matchup-table td.row-header a:hover { text-decoration: underline; }
        .matchup-table td.players-cell.has-tt { cursor: help; }

        /* Round corners on table */
        .matchup-table thead th:first-child { border-top-left-radius: 10px; }
        .matchup-table thead th:last-child { border-top-right-radius: 10px; }
        .matchup-table tbody tr:last-child td:first-child { border-bottom-left-radius: 10px; }
        .matchup-table tbody tr:last-child td:last-child { border-bottom-right-radius: 10px; }

        @media (max-width: 640px) {
            body { padding: 12px; }
            #table-container { max-width: calc(100vw - 24px); }
            .matchup-table th, .matchup-table td { padding: 4px 5px; }
            .matchup-table thead th.col-arch { height: 72px; font-size: 0.62rem; }
            .matchup-table td.row-header { min-width: 90px; font-size: 0.72rem; }
            .win-rate { font-size: 0.72rem; }
            .record { font-size: 0.60rem; }
            .title-row { flex-wrap: wrap; margin-bottom: 12px; }
            h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="title-row">
        <a href="index.html" class="home-link" title="Index">⌂</a>
        <h1 id="table-title">Archetype Matchup Table</h1>
        <div id="page-links"></div>
    </div>

    <div id="status-msg"></div>
    <div id="tooltip"></div>
    <div id="players-tooltip"></div>
    <div id="error-msg" style="display:none"></div>
    <div id="table-area" style="display:none">
        <div id="table-container"></div>
        <div class="legend">
            <div class="legend-row">
                <span>Win rate:</span>
                <span style="color:rgb(180,0,0); font-weight:700">≤25%</span>
                <div class="legend-gradient"></div>
                <span style="color:rgb(0,120,0); font-weight:700">≥75%</span>
                <span style="margin-left:8px; color:#aaa">— no data</span>
            </div>
            <div class="legend-row">
                <span>Sample size:</span>
                <span>few</span>
                <div class="legend-bg-gradient"></div>
                <span>many (n≥25)</span>
            </div>
        </div>
    </div>

    <script>

    const params = new URLSearchParams(window.location.search);
    const tournamentId = params.get('id');

    const lbLink = document.createElement('a');
    lbLink.href = 'leaderboard.html' + (tournamentId ? `?id=${encodeURIComponent(tournamentId)}` : '');
    lbLink.textContent = 'Leaderboard';
    document.getElementById('page-links').appendChild(lbLink);

    const safeTid = (tournamentId && /^[a-zA-Z0-9-]+$/.test(tournamentId)) ? tournamentId : 'default';
    const dataPath = `data/${safeTid}.json`;

    fetch(dataPath)
        .then(r => { if (!r.ok) throw new Error('Could not load tournament, check url'); return r.json(); })
        .then(data => renderTable(data))
        .catch(err => showError('Failed to load: ' + err.message));

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('table-area').style.display = 'none';
    }

    function clearError() {
        document.getElementById('error-msg').style.display = 'none';
    }

    function zipAdd(a, b) {
        return [a[0] + b[0], a[1] + b[1], a[2] + b[2]];
    }

    function computeMatchups(data) {
        const players = data.players;
        const roundResults = data.round_results;
        const matchup = {};     // arch -> arch -> [W, L, D]
        const total = {};       // arch -> [W, L, D]
        const archPlayers = {}; // arch -> Set<playerId>
        const limitedRounds = new Set(data.limited_rounds || []);

        for (const [playerId, playerData] of Object.entries(players)) {
            const arch = playerData.deck.archetype || 'Unknown';
            if (!archPlayers[arch]) archPlayers[arch] = new Set();
            archPlayers[arch].add(playerId);
        }

        for (const [roundIdx, round] of roundResults.entries()) {
            if (limitedRounds.has(roundIdx)) {
                continue;
            }
            for (const result of round) {
                const { p1, p2, games, complete } = result;
                if (p2 === null || p2 === undefined) continue; // bye
                if (!complete) continue;

                const player1 = players[p1];
                const player2 = players[p2];
                if (!player1 || !player2) continue;

                const arch1 = player1.deck.archetype || 'Unknown';
                const arch2 = player2.deck.archetype || 'Unknown';

                // p1 is always match winner per data model; equal games = draw
                let matchRes, revRes;
                if (games[0] === games[1]) {
                    matchRes = [0, 0, 1];
                    revRes   = [0, 0, 1];
                } else {
                    matchRes = [1, 0, 0];
                    revRes   = [0, 1, 0];
                }

                if (!matchup[arch1]) matchup[arch1] = {};
                if (!matchup[arch1][arch2]) matchup[arch1][arch2] = [0, 0, 0];
                matchup[arch1][arch2] = zipAdd(matchup[arch1][arch2], matchRes);

                if (!total[arch1]) total[arch1] = [0, 0, 0];
                total[arch1] = zipAdd(total[arch1], matchRes);

                if (!matchup[arch2]) matchup[arch2] = {};
                if (!matchup[arch2][arch1]) matchup[arch2][arch1] = [0, 0, 0];
                matchup[arch2][arch1] = zipAdd(matchup[arch2][arch1], revRes);

                if (!total[arch2]) total[arch2] = [0, 0, 0];
                total[arch2] = zipAdd(total[arch2], revRes);
            }
        }

        const deckArchs = Object.keys(archPlayers).sort(
            (a, b) => archPlayers[b].size - archPlayers[a].size
        );

        return { matchup, total, archPlayers, deckArchs };
    }

    const MATCH_THRESHOLD = 25;

    function bgColorForN(n) {
        // white at n=0, mid-gray at n>=MATCH_THRESHOLD
        const t = Math.min(1, n / MATCH_THRESHOLD);
        const v = Math.round(255 - t * 70);
        return `rgb(${v},${v},${v})`;
    }

    function winRateTextColor(wr) {
        // dark red (<=25%) -> near-black (50%) -> dark green (>=75%)
        const t = Math.max(0, Math.min(1, (wr - 25) / 50));
        let r, g, b;
        if (t <= 0.5) {
            const s = t * 2;
            r = Math.round(180 + (15 - 180) * s);
            g = Math.round(15 * s);
            b = Math.round(15 * s);
        } else {
            const s = (t - 0.5) * 2;
            r = Math.round(15 * (1 - s));
            g = Math.round(15 + (120 - 15) * s);
            b = Math.round(15 * (1 - s));
        }
        return `rgb(${r},${g},${b})`;
    }

function formatRecord(rec) {
        const n = rec[0] + rec[1] + rec[2];
        if (n === 0) return null;
        const wr = 100.0 * (rec[0] + rec[2] / 2.0) / n;
        return { wr, n, record: `${rec[0]}-${rec[1]}-${rec[2]}` };
    }

    const tooltip = document.getElementById('tooltip');

    function attachTooltip(el, text) {
        let timer, lastX = 0, lastY = 0;
        el.addEventListener('mouseenter', (e) => {
            lastX = e.clientX; lastY = e.clientY;
            timer = setTimeout(() => {
                tooltip.textContent = text;
                tooltip.style.left = (lastX + 14) + 'px';
                tooltip.style.top  = (lastY - 36) + 'px';
                tooltip.style.display = 'block';
            }, 1000);
        });
        el.addEventListener('mousemove', (e) => {
            lastX = e.clientX; lastY = e.clientY;
            if (tooltip.style.display === 'block') {
                tooltip.style.left = (lastX + 14) + 'px';
                tooltip.style.top  = (lastY - 36) + 'px';
            }
        });
        el.addEventListener('mouseleave', () => {
            clearTimeout(timer);
            tooltip.style.display = 'none';
        });
    }

    function computePlayerRecords(data) {
        const records = {};
        for (const pid of Object.keys(data.players || {})) {
            records[pid] = { pending: 0, wins: 0, losses: 0, draws: 0, points: 0 };
        }
        for (const round of (data.round_results || [])) {
            for (const result of round) {
                const { p1, p2, games } = result;
                if (!result.complete) {
                  records[p1].pending++;
                  if (p2) records[p2].pending++;
                  continue;
                }

                if (!p2) {
                    if (records[p1]) {
                        if (games[1] === 2) records[p1].losses++;
                        else { records[p1].wins++; records[p1].points += 3; }
                    }
                } else if (games[0] > games[1]) {
                    if (records[p1]) { records[p1].wins++; records[p1].points += 3; }
                    if (records[p2]) records[p2].losses++;
                } else if (games[1] > games[0]) {
                    if (records[p1]) records[p1].losses++;
                    if (records[p2]) { records[p2].wins++; records[p2].points += 3; }
                } else {
                    if (records[p1]) { records[p1].draws++; records[p1].points += 1; }
                    if (records[p2]) { records[p2].draws++; records[p2].points += 1; }
                }
            }
        }
        return records;
    }

    function topPidsForArch(pidSet, records) {
        return [...pidSet].sort((a, b) => {
            const ra = records[a], rb = records[b];
            if (rb.points !== ra.points) return rb.points - ra.points;
            return rb.wins - ra.wins;
        });
    }

    const playersTooltip = document.getElementById('players-tooltip');

    function showPlayersTooltip(el, players) {
        playersTooltip.innerHTML = '';
        for (const p of players) {
            const row = document.createElement('div');
            row.className = 'pt-row';
            const nm = document.createElement('span');
            nm.className = 'pt-name';
            nm.textContent = p.name;
            const rc = document.createElement('span');
            rc.className = 'pt-rec';
            rc.textContent = `${p.wins}-${p.losses}-${p.draws}`;
            row.append(nm, rc);
            playersTooltip.appendChild(row);
        }
        playersTooltip.style.display = 'block';
        const cr = el.getBoundingClientRect();
        const tr = playersTooltip.getBoundingClientRect();
        let left = cr.right + 8, top = cr.top;
        if (left + tr.width > window.innerWidth - 8) left = cr.left - tr.width - 8;
        if (top + tr.height > window.innerHeight - 8) top = window.innerHeight - tr.height - 8;
        playersTooltip.style.left = Math.max(8, left) + 'px';
        playersTooltip.style.top  = Math.max(8, top)  + 'px';
    }

    function hidePlayersTooltip() {
        playersTooltip.style.display = 'none';
    }

    function attachPlayersTooltip(el, players) {
        el.addEventListener('mouseenter', () => showPlayersTooltip(el, players));
        el.addEventListener('mouseleave', hidePlayersTooltip);
        el.addEventListener('touchstart', e => {
            e.stopPropagation();
            if (playersTooltip.style.display === 'block') hidePlayersTooltip();
            else showPlayersTooltip(el, players);
        }, { passive: true });
    }

    document.addEventListener('touchstart', hidePlayersTooltip);

    function esc(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function makeCell(rec, extraClass) {
        const td = document.createElement('td');
        const fmt = formatRecord(rec || [0, 0, 0]);
        if (fmt) {
            td.className = 'matchup-cell' + (extraClass ? ' ' + extraClass : '');
            td.style.backgroundColor = bgColorForN(fmt.n);
            td.innerHTML =
                `<span class="win-rate" style="color:${winRateTextColor(fmt.wr)}">${fmt.wr.toFixed(1)}%</span>` +
                `<div class="record">${fmt.record}</div>`;
        } else {
            td.className = 'no-data' + (extraClass ? ' ' + extraClass : '');
            td.textContent = '—';
        }
        return td;
    }

    function renderTable(data) {
        clearError();

        const title = data.title ? data.title : "Archetype Matchup Table";
        document.title = title;
        document.getElementById('table-title').textContent = title;
        if (data.source_url) {
            const a = document.createElement('a');
            a.href = data.source_url;
            a.textContent = 'Data Source';
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            document.getElementById('page-links').appendChild(a);
        }

        let stats;
        try { stats = computeMatchups(data); }
        catch (err) { showError('Error processing data: ' + err.message); return; }

        const { matchup, total, archPlayers, deckArchs } = stats;
        const records = computePlayerRecords(data);

        if (deckArchs.length === 0) {
            showError('No archetype data found in this tournament file.');
            return;
        }

        const playerCount = Object.keys(data.players || {}).length;
        document.getElementById('status-msg').textContent =
            `${playerCount} players · ${deckArchs.length} archetypes`;

        // The "Players" column gets a second line in two cases:
        //   - Active tournament: show how many of each archetype are still
        //     mathematically alive given the required_points thresholds.
        //   - Completed tournament: show how many made the cut (i.e. met the
        //     single largest required_points threshold).
        const rounds = data.round_results || [];
        const lastRound = rounds.length ? rounds[rounds.length - 1] : null;
        const isActive = !lastRound || lastRound.length === 0;
        const playedRounds = rounds.reduce((n, r) => n + (r.length > 0 ? 1 : 0), 0);
        const requiredPoints = data.required_points || {};
        const reqKeys = Object.keys(requiredPoints).map(Number).sort((a, b) => b - a);
        const cutKey = reqKeys.length ? reqKeys[0] : null;
        const cutVal = cutKey != null ? requiredPoints[String(cutKey)] : null;

        const showContention = isActive && cutKey != null;
        const showCut = !isActive && cutKey != null && rounds.length >= cutKey;

        const inContention = (pid) => {
            const rec = records[pid];
            if (!rec) return false;
            const roundsPlayed = rec.wins + rec.losses + rec.draws;
            if (roundsPlayed + rec.pending < playedRounds) return false;
            for (const keyStr of Object.keys(requiredPoints)) {
                const key = +keyStr;
                const maxPoints = rec.points + 3 * Math.max(0, key - roundsPlayed);
                if (maxPoints < requiredPoints[keyStr]) return false;
            }
            return true;
        };

        // For completed tournaments, a player made the cut iff their final
        // points meet the threshold — players who didn't make the cut would
        // have stopped playing, so their final points can't exceed it.
        const madeCut = (pid) => {
            const rec = records[pid];
            return !!(rec && rec.points >= cutVal);
        };

const table = document.createElement('table');
        table.className = 'matchup-table';

        // ── Header row ────────────────────────────────────────────────────────
        const thead = document.createElement('thead');
        const hrow = document.createElement('tr');

        const mkTh = (text, cls) => {
            const th = document.createElement('th');
            th.textContent = text;
            if (cls) th.className = cls;
            return th;
        };

        hrow.appendChild(mkTh('Archetype'));
        const subLabel = showContention ? 'Remaining' : showCut ? 'Made Cut' : null;
        if (subLabel) {
            const th = document.createElement('th');
            th.innerHTML = `Players<br>(${subLabel})`;
            hrow.appendChild(th);
        } else {
            hrow.appendChild(mkTh('Players'));
        }
        hrow.appendChild(mkTh('Total'));

        for (const arch of deckArchs) {
            const th = mkTh(arch, 'col-arch');
            th.title = arch;
            hrow.appendChild(th);
        }

        thead.appendChild(hrow);
        table.appendChild(thead);

        // ── Body rows ─────────────────────────────────────────────────────────
        const tbody = document.createElement('tbody');

        for (const arch of deckArchs) {
            const tr = document.createElement('tr');

            const sortedPids = topPidsForArch(archPlayers[arch], records);
            const topPid = sortedPids[0];
            const topDeckUrl = topPid && data.players[topPid]?.deck?.url;

            // Sticky row label (link to top player's deck if available)
            const labelTd = document.createElement('td');
            labelTd.className = 'row-header';
            if (topDeckUrl) {
                const a = document.createElement('a');
                a.href = topDeckUrl;
                a.textContent = arch;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                labelTd.appendChild(a);
            } else {
                labelTd.textContent = arch;
            }
            tr.appendChild(labelTd);

            // Player count (with top-5 players tooltip)
            const playersTd = document.createElement('td');
            playersTd.className = 'players-cell has-tt';
            const totalPlayers = archPlayers[arch].size;
            if (showContention || showCut) {
                let count = 0;
                for (const pid of archPlayers[arch]) {
                    if (showContention ? inContention(pid) : madeCut(pid)) count++;
                }
                const pct = Math.round(100 * count / totalPlayers);
                playersTd.innerHTML = `${totalPlayers}<br>(${count} - ${pct}%)`;
                playersTd.title = showContention
                    ? `${totalPlayers} total, ${count} (${pct}%) still mathematically alive`
                    : `${totalPlayers} total, ${count} (${pct}%) made the cut (${cutVal}+ points after ${cutKey} rounds)`;
            } else {
                playersTd.textContent = totalPlayers;
            }
            const top5 = sortedPids.slice(0, 5).map(pid => ({
                name: data.players[pid]?.name || pid,
                ...records[pid],
            }));
            if (top5.length > 0) attachPlayersTooltip(playersTd, top5);
            tr.appendChild(playersTd);

            // Total record
            const totalTd = makeCell(total[arch], 'total-cell');
            tr.appendChild(totalTd);

            // Per-archetype matchup cells
            for (const arch2 of deckArchs) {
                const rec = matchup[arch] ? matchup[arch][arch2] : null;
                const td = makeCell(rec);
                const span = td.querySelector('.win-rate');
                if (span) attachTooltip(span, `${arch} vs ${arch2}`);
                tr.appendChild(td);
            }

            tbody.appendChild(tr);
        }

        table.appendChild(tbody);

        const container = document.getElementById('table-container');
        container.innerHTML = '';
        container.appendChild(table);
        document.getElementById('table-area').style.display = 'flex';
    }
    </script>
</body>
</html>
